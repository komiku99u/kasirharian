<!DOCTYPE html>
<html lang="id">
  <head>
    <head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<link rel="icon" href="favicon.ico" type="image/x-icon">
	<title>Kasir Harian</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="grid">
      <div class="card">
        <h2>Produk</h2>

        <input id="barcode" placeholder="Barcode" />
        <input id="nama" placeholder="Nama Produk" />
        <input id="harga" type="number" placeholder="Harga" />

        <button id="btnProduk" onclick="tambahProduk()">Tambah Produk</button>
        <button id="btnBatal" style="display: none" onclick="batalEdit()">
          Batal Edit
        </button>
        <div class="row">
          <button onclick="exportCSV()">
    Export CSV
</button>

<button onclick="document.getElementById('importFile').click()">
    Import CSV
</button>
        </div>

        <input
    type="file"
    id="importFile"
    accept=".csv"
    hidden>

        <input
          id="cari"
          placeholder="Cari produk atau scan barcode..."
          oninput="cariProduk()"
          onkeydown="
            if (event.key === 'Enter') {
              pilihProdukPertama();
            }
          "
        />

        <div id="hasilCari"></div>
      </div>

      <div class="card">
        <h2>Transaksi</h2>

        <input
          id="scanBarcode"
          placeholder="Scan barcode di sini..."
          autocomplete="off"
        />

        <div id="cartList"></div>

        <h2>Total: Rp <span id="total">0</span></h2>

        <input
          id="bayar"
          type="number"
          placeholder="Uang Bayar"
          oninput="updateKembalian()"
        />

        <div class="uang-cepat">
          <button onclick="bayarPas()">Pas</button>

          <button onclick="tambahBayar(5000)">5K</button>

          <button onclick="tambahBayar(10000)">10K</button>

          <button onclick="tambahBayar(20000)">20K</button>

          <button onclick="tambahBayar(50000)">50K</button>

          <button onclick="tambahBayar(100000)">100K</button>

          <button onclick="resetBayar()">C</button>
        </div>
        <div class="row">
          <button class="success" onclick="prosesBayar()">💰 Bayar</button>
        </div>

        <h2>Kembalian: Rp <span id="kembalian">0</span></h2>
        <h3 id="statusBayar">❌ Belum Dibayar</h3>

        <div class="row">
          <button onclick="prosesBayar()" style="background: #f59e0b">
            💰 Bayar
          </button>
          <button class="success" onclick="selesaikan()">Selesaikan</button>
          <button class="danger" onclick="transaksiBaru()">
            Transaksi Baru
          </button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
    <div id="popup" style="display: none">
      <div class="popup-box">
        <h3 id="popupTitle">Informasi</h3>

        <p id="popupMessage"></p>

        <div class="popup-buttons">
          <button id="popupOk">OK</button>

          <button id="popupCancel" class="danger" style="display: none">
            Batal
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
